        <style>
        .gallery-section { padding: 3rem 0; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 0 15px;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            cursor: pointer;
            aspect-ratio: 4/3;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .gallery-item-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .gallery-item:hover .gallery-item-overlay { transform: translateY(0); }
        .gallery-item-title { color: white; font-weight: 600; font-size: 1.1rem; margin-bottom: 5px; }
        .gallery-item-desc { color: rgba(255,255,255,0.9); font-size: 0.9rem; }

        /* Lightbox */
        .lightbox {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999; align-items: center; justify-content: center;
        }
        .lightbox.active { display: flex; }
        .lightbox-content { max-width: 90%; max-height: 90vh; position: relative; }
        .lightbox-content img { max-width: 100%; max-height: 90vh; object-fit: contain; border-radius: 8px; }
        .lightbox-close {
            position: absolute; top: 20px; right: 20px;
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.2); border: none;
            border-radius: 50%; color: white; font-size: 2rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.3s ease;
        }
        .lightbox-close:hover { background: rgba(255,255,255,0.3); }
        .lightbox-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.2); border: none;
            border-radius: 50%; color: white; font-size: 1.5rem;
            cursor: pointer; transition: background 0.3s ease;
        }
        .lightbox-nav:hover { background: rgba(255,255,255,0.3); }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        .lightbox-caption {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white;
            padding: 15px 30px; border-radius: 25px; text-align: center; max-width: 80%;
        }
        .lightbox-caption-title { font-weight: 600; font-size: 1.1rem; margin-bottom: 5px; }
        .lightbox-caption-desc { font-size: 0.9rem; opacity: 0.9; }

        /* Tabs */
        .gallery-tabs {
            display: flex; justify-content: center; gap: 20px;
            margin-bottom: 3rem; flex-wrap: wrap;
        }
        .gallery-tab {
            padding: 12px 40px; border: 2px solid #3D405B;
            background: transparent; color: #333; font-size: 1.1rem; font-weight: 600;
            border-radius: 50px; cursor: pointer; transition: all 0.3s ease;
        }
        .gallery-tab:hover { background: rgba(242,204,143,0.1); transform: translateY(-2px); }
        .gallery-tab.active { background: #3D405B; color: white; }
        .gallery-tab-content { display: none; }
        .gallery-tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .video-section { padding: 3rem 0; background: #f8f9fa; }
        .events-section .container { padding-left: 32px; padding-right: 32px; }

        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
            .lightbox-close, .lightbox-nav { width: 40px; height: 40px; font-size: 1.2rem; }
            .lightbox-close { top: 10px; right: 10px; }
            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
            .lightbox-caption { padding: 8px 14px; max-width: 90%; bottom: 12px; }
            .lightbox-caption-title { font-size: 0.8rem; }
            .lightbox-caption-desc { font-size: 0.7rem; }
        }

        <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tabs = document.querySelectorAll('.gallery-tab');
            const tabContents = document.querySelectorAll('.gallery-tab-content');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetTab = tab.dataset.tab;
                    tabs.forEach(t => t.classList.remove('active'));
                    tabContents.forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(targetTab + '-gallery').classList.add('active');
                });
            });

            const lightbox = document.getElementById('lightbox');
            const lightboxImage = document.getElementById('lightbox-image');
            const lightboxTitle = document.getElementById('lightbox-title');
            const lightboxDesc = document.getElementById('lightbox-desc');
            const lightboxClose = document.getElementById('lightbox-close');
            const lightboxPrev = document.getElementById('lightbox-prev');
            const lightboxNext = document.getElementById('lightbox-next');
            let currentIndex = 0;
            let currentImages = [];

            function updateCurrentImages() {
                const activeTabContent = document.querySelector('.gallery-tab-content.active');
                currentImages = Array.from(activeTabContent.querySelectorAll('.gallery-item')).map(item => ({
                    src: item.dataset.image, title: item.dataset.title, desc: item.dataset.desc
                }));
            }
            function openLightbox(index) {
                updateCurrentImages(); currentIndex = index; updateLightbox();
                lightbox.classList.add('active'); document.body.style.overflow = 'hidden';
            }
            function closeLightbox() {
                lightbox.classList.remove('active'); document.body.style.overflow = '';
            }
            function updateLightbox() {
                const image = currentImages[currentIndex];
                lightboxImage.src = image.src; lightboxTitle.textContent = image.title;
                lightboxDesc.textContent = image.desc;
                lightboxDesc.style.display = image.desc ? 'block' : 'none';
            }
            function nextImage() { currentIndex = (currentIndex + 1) % currentImages.length; updateLightbox(); }
            function prevImage() { currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length; updateLightbox(); }

            document.addEventListener('click', function(e) {
                const galleryItem = e.target.closest('.gallery-item');
                if (galleryItem && galleryItem.closest('.gallery-tab-content.active')) {
                    const activeTabContent = document.querySelector('.gallery-tab-content.active');
                    const galleryItems = activeTabContent.querySelectorAll('.gallery-item');
                    openLightbox(Array.from(galleryItems).indexOf(galleryItem));
                }
            });
            lightboxClose.addEventListener('click', closeLightbox);
            lightboxNext.addEventListener('click', nextImage);
            lightboxPrev.addEventListener('click', prevImage);
            lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowRight') nextImage();
                if (e.key === 'ArrowLeft') prevImage();
            });

            let touchStartX = 0;
            lightbox.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
            lightbox.addEventListener('touchend', (e) => {
                const diff = e.changedTouches[0].screenX - touchStartX;
                if (diff < -50) nextImage();
                if (diff > 50) prevImage();
            });
        });
        </script>
